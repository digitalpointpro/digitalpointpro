<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Main rounded square -->
  <rect x="2" y="2" width="36" height="36" rx="10" ry="10" fill="url(#logoGrad)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect x="2" y="2" width="36" height="18" rx="10" ry="10" fill="url(#shineGrad)"/>
  <!-- Letter D -->
  <text x="20" y="28" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold" fill="white" letter-spacing="-1">D</text>
</svg>
